<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GOURAB PREMIUM CHECKER</title>
    <style>
        :root { --gold: #ffcc00; --bg: #030712; --red: #ef4444; --green: #10b981; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .nav { background: #111827; padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        .welcome-msg { padding: 20px; text-align: center; background: #1e293b; margin: 10px; border-radius: 10px; }
        .tool-box { padding: 20px; display: none; }
        .active { display: block; }
        textarea { width: 100%; height: 150px; background: #000; color: var(--gold); border: 1px solid #333; padding: 10px; }
        .btn { width: 100%; padding: 12px; background: var(--gold); color: black; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; }
        .res-container { margin-top: 20px; }
        .good { color: var(--green); background: #064e3b; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
        .bad { color: var(--red); background: #7f1d1d; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
        .copy-btn { font-size: 12px; background: #333; color: #fff; padding: 3px 8px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div id="loginPage" class="active">
    </div>

<div id="mainApp" style="display:none;">
    <div class="nav">
        <h2>GOURAB SLIT TOOLS</h2>
    </div>

    <div class="welcome-msg">
        গৌরব ভাইয়ের এই সাইটে আপনাকে স্বাগতম। এই সাইটে আপনি আপনার প্রয়োজনের সবকিছু পেয়ে যাবেন। ভদ্রতার সাথে কাজ করুন এবং কোনো সমস্যা হলে গৌরব ভাইকে বলুন। ধন্যবাদ।
    </div>

    <div id="gmailSlit" class="tool-box active">
        <h3>Gmail Slit (100% Accuracy)</h3>
        <textarea id="gmailInput" placeholder="Enter emails here..."></textarea>
        <button class="btn" onclick="checkGmail()">Check Gmail</button>
        <div class="res-container" id="gmailRes"></div>
    </div>

    <div id="ipSlit" class="tool-box">
        <h3>Ip Slit (Whoer Quality)</h3>
        <button class="btn" onclick="checkIP()">Auto Detect My IP Detail</button>
        <div id="ipDetails" style="margin-top:15px; line-height: 2;"></div>
    </div>

    <div id="fbSlit" class="tool-box">
        <h3>Facbook Slit (Live/Die)</h3>
        <textarea id="fbInput" placeholder="UID|PASS or Cookies..."></textarea>
        <button class="btn" onclick="checkFB()">Check FB ID</button>
        <div class="res-container" id="fbRes"></div>
    </div>
</div>

<script>
    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert("Copied!");
    }

    async function checkIP() {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        document.getElementById('ipDetails').innerHTML = `
            <div class="good">Country: ${data.country_name} <span class="copy-btn" onclick="copyText('ip_c')">Copy</span> <span id="ip_c" style="display:none">${data.country_name}</span></div>
            <div class="good">Region: ${data.region}</div>
            <div class="good">Timezone: ${data.timezone}</div>
            <div class="good">Device: ${navigator.userAgent.includes('Android') ? 'Android' : 'iOS/PC'}</div>
            <div class="good">Safety Score: 100% Connect</div>
        `;
    }

    // Gmail, FB, TG এর জন্য আরও অনেক ফাংশন এখানে অ্যাড করা হবে...
</script>
</body>
</html>
